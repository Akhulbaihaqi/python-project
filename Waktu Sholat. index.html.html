    body.light-mode #stars,
    body.light-mode #stars2,
    body.light-mode #stars3 {
      opacity: 0;
    }

    @keyframes animStar {
      from { transform: translateY(0px); }
      to { transform: translateY(-2000px); }
    }

    @keyframes introFadeUp {
      0% { opacity: 0; transform: translateY(30px); }
      100% { opacity: 1; transform: translateY(0); }
    }


    .bg-deco {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      z-index: 0;
      height: 300px;
      background: linear-gradient(to top, var(--navy), transparent);
      opacity: 0.15;
      pointer-events: none;
    }

    body.light-mode .bg-deco {
      opacity: 0.05;
    }

    .theme-logo {
      position: absolute;
      top: 40px;
      right: 60px;
      z-index: 100;
      width: 60px;
      height: 60px;
      background: radial-gradient(circle at 35% 40%, #E8C97A 0%, #C9A84C 60%, transparent 100%);
      border-radius: 50%;
      box-shadow: 0 0 30px rgba(201, 168, 76, 0.4);
      animation: logoGlow 4s ease-in-out infinite alternate;
      cursor: pointer;
      transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1);
    }

    /* Moon shape using ::after */
    .theme-logo::after {
      content: '';
      position: absolute;
      top: 5px;
      left: 12px;
      width: 45px;
      height: 45px;
      background: var(--deep);
      border-radius: 50%;
      transition: all 0.5s;
    }

    /* Sun shape in light mode */
    body.light-mode .theme-logo {
      background: radial-gradient(circle, #F39C12 0%, #E67E22 70%);
      box-shadow: 0 0 40px rgba(243, 156, 18, 0.5);
      transform: scale(1.1);
    }

    body.light-mode .theme-logo::after {
      transform: scale(0); /* Remove the moon crescent to make it a sun */
      opacity: 0;
    }

    @keyframes logoGlow {
      from { box-shadow: 0 0 30px rgba(201, 168, 76, 0.4); }
      to { box-shadow: 0 0 60px rgba(201, 168, 76, 0.6); }
    }

    body.light-mode .theme-logo {
      animation: sunPulse 4s ease-in-out infinite alternate;
    }

    @keyframes sunPulse {
      from { box-shadow: 0 0 40px rgba(243, 156, 18, 0.4); }
      to { box-shadow: 0 0 80px rgba(243, 156, 18, 0.6); }
    }

    .container {
      position: relative;
      z-index: 2;
      max-width: 1200px;
      margin: 0 auto;
      padding: 40px 20px 60px;
    }

    .main-grid {
      display: grid;
      grid-template-columns: 350px 1fr;
      gap: 30px;
      align-items: start;
    }

    @media (max-width: 950px) {
      .main-grid {
        grid-template-columns: 1fr;
      }
      .container {
        padding-top: 20px;
      }
    }

    .sidebar {
      position: sticky;
      top: 20px;
    }

    .export-card {
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid var(--glass-border);
      border-radius: 15px;
      padding: 20px;
      margin-top: 20px;
    }

    .export-grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 10px;
    }

    .header {
      text-align: center;
      margin-bottom: 30px;
      position: relative;
    }

    .arabic-title {
      font-family: 'Amiri', serif;
      font-size: 2.5rem;
      color: var(--gold);
      display: block;
      text-shadow: 0 0 20px rgba(201, 168, 76, 0.4);
      animation: introFadeUp 1.2s ease-out forwards;
    }

    .title {
      font-size: 0.9rem;
      font-weight: 300;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      color: var(--muted);
      animation: introFadeUp 1.2s ease-out 0.2s forwards;
      opacity: 0;
    }

    /* View Toggler */
    .view-tabs {
      display: flex;
      justify-content: center;
      gap: 10px;
      margin-bottom: 25px;
    }

    .tab-btn {
      background: var(--glass);
      border: 1px solid var(--glass-border);
      color: var(--cream);
      padding: 10px 24px;
      border-radius: 30px;
      cursor: pointer;
      font-size: 0.85rem;
      font-weight: 600;
      transition: all 0.3s ease;
      backdrop-filter: blur(10px);
      display: inline-flex;
      align-items: center;
      gap: 8px;
    }

    .tab-btn:hover {
      transform: translateY(-5px);
      border-color: var(--gold);
      box-shadow: 0 5px 15px rgba(201, 168, 76, 0.2);
    }

    .tab-btn.active {
      background: var(--gold);
      color: var(--deep);
      border-color: var(--gold);
      box-shadow: 0 0 20px rgba(201, 168, 76, 0.4);
    }

    .tab-btn svg {
      transition: 0.3s;
    }

    .tab-btn.active svg {
      stroke: var(--deep);
    }

    /* Control Panels */
    .panel {
      background: var(--glass);
      border: 1px solid var(--glass-border);
      border-radius: 20px;
      padding: 24px;
      margin-bottom: 20px;
      backdrop-filter: blur(12px);
      transition: transform 0.3s ease;
    }

    .form-row {
      display: grid;
      gap: 15px;
      margin-bottom: 15px;
    }

    .grid-3 {
      grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
    }

    .grid-2 {
      grid-template-columns: 1fr 1fr;
    }

    .input-group label {
      display: block;
      font-size: 0.7rem;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: var(--gold);
      margin-bottom: 6px;
    }

    .input-group input,
    .input-group select {
      width: 100%;
      background: rgba(255, 255, 255, 0.08);
      border: 1px solid rgba(201, 168, 76, 0.25);
      border-radius: 12px;
      padding: 12px;
      color: var(--cream);
      font-family: inherit;
      outline: none;
      transition: all 0.3s ease;
    }

    .input-group select option {
      background: var(--navy);
      color: var(--cream);
    }

    .input-group input:focus,
    .input-group select:focus {
      border-color: var(--gold);
      background: rgba(15, 36, 71, 0.8);
      box-shadow: 0 0 10px rgba(201, 168, 76, 0.2);
    }

    .btn {
      padding: 12px 20px;
      border-radius: 12px;
      border: none;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }

    .btn-primary {
      background: var(--gold);
      color: var(--deep);
    }

    .btn-secondary {
      background: rgba(255, 255, 255, 0.1);
      color: var(--cream);
      border: 1px solid var(--glass-border);
    }

    .btn:hover {
      transform: translateY(-5px);
      box-shadow: 0 5px 15px rgba(201, 168, 76, 0.3);
      opacity: 1;
    }

    .btn-primary:hover {
      background: var(--gold-light);
    }

    .btn-secondary:hover {
      background: rgba(255, 255, 255, 0.15);
      border-color: var(--gold);
    }

    /* Navigation Controls */
    .nav-group {
      display: flex;
      align-items: center;
      gap: 5px;
      width: 100%;
    }

    .nav-btn {
      background: rgba(255, 255, 255, 0.1);
      border: 1px solid var(--glass-border);
      color: var(--gold);
      padding: 10px;
      border-radius: 10px;
      cursor: pointer;
      transition: all 0.2s;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .nav-btn:hover {
      background: var(--gold);
      color: var(--deep);
      box-shadow: 0 0 10px rgba(201, 168, 76, 0.3);
    }

    /* Info Bar */
    .info-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      background: rgba(201, 168, 76, 0.05);
      border-radius: 15px;
      padding: 15px 20px;
      margin-bottom: 25px;
      border-left: 4px solid var(--gold);
    }

    .loc-name {
      font-weight: 600;
      font-size: 1.1rem;
    }

    .date-hijri {
      color: var(--gold);
      font-family: 'Amiri', serif;
      font-size: 1.1rem;
    }

    /* Views */
    .view-content {
      display: none;
      animation: fadeIn 0.5s ease both;
    }

    .view-content.active {
      display: block;
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateY(10px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    /* Daily List */
    .prayer-list {
      display: flex;
      flex-direction: column;
      gap: 12px;
      max-width: 500px;
      margin: 0 auto;
    }

    .prayer-card {
      background: var(--glass);
      border: 1px solid var(--glass-border);
      border-radius: 15px;
      padding: 20px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      backdrop-filter: blur(8px);
    }

    .prayer-card.active {
      border-color: var(--gold);
      background: rgba(201, 168, 76, 0.1);
      box-shadow: 0 0 20px rgba(201, 168, 76, 0.1);
    }

    .prayer-info {
      display: flex;
      align-items: center;
      gap: 15px;
    }

    .p-icon {
      font-size: 1.5rem;
    }

    .p-name {
      font-weight: 500;
      font-size: 1.1rem;
    }

    .p-time {
      font-size: 1.4rem;
      font-weight: 600;
      color: var(--gold-light);
    }

    /* Monthly Table */
    .table-container {
      overflow-x: auto;
      background: var(--glass);
      border-radius: 15px;
      border: 1px solid var(--glass-border);
    }

    table {
      width: 100%;
      border-collapse: collapse;
      min-width: 600px;
    }

    th,
    td {
      padding: 15px;
      text-align: left;
      border-bottom: 1px solid rgba(255, 255, 255, 0.05);
    }

    th {
      background: rgba(201, 168, 76, 0.1);
      color: var(--gold);
      font-size: 0.75rem;
      text-transform: uppercase;
      letter-spacing: 0.1em;
    }

    tr:hover {
      background: rgba(255, 255, 255, 0.02);
    }

    .today-row {
      background: rgba(201, 168, 76, 0.15) !important;
      border-left: 3px solid var(--gold);
    }

    /* Export Buttons */
    .export-actions {
      display: flex;
      gap: 12px;
      margin-top: 20px;
      justify-content: flex-end;
    }

    .loading-overlay {
      position: fixed;
      inset: 0;
      background: var(--deep);
      z-index: 1000;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      transition: opacity 0.5s ease;
    }

    .spinner {
      width: 50px;
      height: 50px;
      border: 3px solid rgba(201, 168, 76, 0.2);
      border-top-color: var(--gold);
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }

    @keyframes spin {
      to {
        transform: rotate(360deg);
      }
    }

    /* Search Suggestions */
    .search-wrap {
      position: relative;
    }

    .suggestions {
      position: absolute;
      top: 100%;
      left: 0;
      right: 0;
      background: var(--navy);
      border: 1px solid var(--gold);
      border-radius: 10px;
      max-height: 200px;
      overflow-y: auto;
      z-index: 100;
      display: none;
    }

    .suggestion-item {
      padding: 10px;
      cursor: pointer;
      border-bottom: 1px solid rgba(255, 255, 255, 0.1);
    }

    .suggestion-item:hover {
      background: rgba(201, 168, 76, 0.1);
    }

    .btn-fancy {
      color: var(--text-main);
      opacity: 0.8;
      padding: 10px 15px;
      display: inline-flex;
      justify-content: center;
      align-items: center;
      text-shadow: 0 0 20px rgba(255, 255, 255, 0.2);
      background: rgba(255, 255, 255, 0.08);
      overflow: hidden;
      font-size: 0.9rem;
      font-weight: 600;
      gap: 8px;
      border-radius: 5px;
      margin: 0 5px;
      transition: 0.2s;
      border: 1px solid transparent;
      cursor: pointer;
      text-decoration: none;
      backdrop-filter: blur(10px);
    }

    .btn-fancy:hover {
      border-color: var(--gold);
      background: rgba(255, 255, 255, 0.2);
      box-shadow: 0 6px var(--gold);
      transform: translateY(-6px);
      opacity: 1;
    }

    body.light-mode .btn-fancy {
      background: rgba(0, 0, 0, 0.03);
      border: 1px solid rgba(201, 168, 76, 0.2);
    }

    body.light-mode .btn-fancy:hover {
      background: rgba(201, 168, 76, 0.1);
      box-shadow: 0 6px var(--gold);
    }

    .btn-fancy:active {
      transform: translateY(2px);
      box-shadow: none;
    }

    /* Brand Colors for Export Buttons */
    .btn-pdf { --type-color: #ff4d4d; }
    .btn-excel { --type-color: #2ecc71; }
    .btn-txt { --type-color: #3498db; }

    .btn-fancy.btn-pdf:hover { border-color: var(--type-color); box-shadow: 0 0 15px rgba(255, 77, 77, 0.3); }
    .btn-fancy.btn-excel:hover { border-color: var(--type-color); box-shadow: 0 0 15px rgba(46, 204, 113, 0.3); }
    .btn-fancy.btn-txt:hover { border-color: var(--type-color); box-shadow: 0 0 15px rgba(52, 152, 219, 0.3); }

    .btn-fancy svg {
      filter: drop-shadow(0 0 2px rgba(0,0,0,0.3));
    }

    @media (max-width: 600px) {
      .grid-2 {
        grid-template-columns: 1fr;
      }

      .header .arabic-title {
        font-size: 2rem;
      }

      .info-bar {
        flex-direction: column;
        gap: 10px;
        text-align: center;
      }
    }
  </style>
</head>

<body>

  <div id="stars"></div>
  <div id="stars2"></div>
  <div id="stars3"></div>
  <div class="bg-deco"></div>
  <div class="moon"></div>

  <div class="loading-overlay" id="loadingOverlay">
    <div class="spinner"></div>
    <p style="margin-top: 20px; color: var(--gold); letter-spacing: 0.2em;">BISMILLAH...</p>
  </div>

  <div class="container">
    <div class="header">
      <span class="arabic-title">أوقات الصلاة</span>
      <p class="title">Jadwal Waktu Sholat</p>
    </div>

    <!-- Clickable Moon/Sun Decoration as Toggle -->
    <div id="themeLogo" class="theme-logo" onclick="toggleTheme()" title="Klik untuk ganti mode"></div>

    <div class="main-grid">
      <!-- Sidebar Settings -->
      <div class="sidebar">
        <div class="panel">
          <div class="form-row">
            <div class="input-group">
              <label>Cari Kota / Wilayah</label>
              <div class="search-wrap">
                <input type="text" id="cityInput" placeholder="Contoh: Jakarta, Surabaya, Mecca..." autocomplete="off">
                <div id="suggestions" class="suggestions"></div>
              </div>
            </div>
          </div>
          <div class="form-row">
            <div class="input-group">
              <label>Bulan</label>
              <div class="nav-group">
                <button class="nav-btn" onclick="changeMonth(-1)">
                  <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"></polyline></svg>
                </button>
                <select id="monthSelect" onchange="updateData()">
                  <option value="1">Januari</option>
                  <option value="2">Februari</option>
                  <option value="3">Maret</option>
                  <option value="4">April</option>
                  <option value="5">Mei</option>
                  <option value="6">Juni</option>
                  <option value="7">Juli</option>
                  <option value="8">Agustus</option>
                  <option value="9">September</option>
                  <option value="10">Oktober</option>
                  <option value="11">November</option>
                  <option value="12">Desember</option>
                </select>
                <button class="nav-btn" onclick="changeMonth(1)">
                  <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"></polyline></svg>
                </button>
              </div>
            </div>
          </div>
          <div class="form-row">
            <div class="input-group">
              <label>Tahun</label>
              <div class="nav-group">
                <button class="nav-btn" onclick="changeYear(-1)">
                  <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"></polyline></svg>
                </button>
                <select id="yearInput" onchange="updateData()">
                  <!-- Populated by JS -->
                </select>
                <button class="nav-btn" onclick="changeYear(1)">
                  <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"></polyline></svg>
                </button>
              </div>
            </div>
          </div>

          <div class="form-row">
            <div class="input-group">
              <label>Tampilan Kalender</label>
              <select id="calendarType" onchange="renderMonthly()">
                <option value="gregorian">Masehi (Gregorian)</option>
                <option value="hijri">Hijriah (Islamic)</option>
              </select>
            </div>
          </div>

          <div class="form-row">
            <div class="input-group">
              <label>Metode Hisab</label>
              <select id="methodSelect" onchange="updateData()">
                <option value="11">Kemenag RI</option>
                <option value="4">Umm al-Qura (Makkah)</option>
                <option value="2">ISNA (North America)</option>
                <option value="3">MWL (Muslim World League)</option>
                <option value="1">Egyptian General Authority</option>
              </select>
            </div>
          </div>

          <div class="form-row">
            <div class="input-group">
              <label>Mazhab Ashar</label>
              <select id="asrSchool" onchange="updateData()">
                <option value="0">Syafi'i, Maliki, Hambali</option>
                <option value="1">Hanafi</option>
              </select>
            </div>
          </div>

          <div style="display: flex; gap: 10px; margin-top: 10px;">
            <button class="btn btn-secondary" style="flex: 1" onclick="getLocation()">📡 GPS</button>
            <button class="btn btn-primary" style="flex: 2" onclick="updateData()">🕌 Update Jadwal</button>
          </div>
        </div>

        <div class="export-card">
          <label style="color: var(--gold); font-size: 0.7rem; text-transform: uppercase; margin-bottom: 15px; display: block;">Export & Download</label>
          <div class="export-grid">
            <button class="btn-fancy btn-pdf" onclick="exportToPDF()">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#ff4d4d" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path><polyline points="14 2 14 8 20 8"></polyline><path d="M9 13v-3h1.5a1.5 1.5 0 0 1 0 3H9z"></path><path d="M12 13v-3h1.5a1.5 1.5 0 0 1 1.5 1.5v0a1.5 1.5 0 0 1-1.5 1.5H12z"></path><path d="M16 13v-3h3"></path></svg>
              PDF
            </button>
            <button class="btn-fancy btn-excel" onclick="exportToExcel()">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#2ecc71" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path><polyline points="14 2 14 8 20 8"></polyline><line x1="8" y1="13" x2="16" y2="13"></line><line x1="8" y1="17" x2="16" y2="17"></line><line x1="8" y1="9" x2="10" y2="9"></line></svg>
              Excel
            </button>
            <button class="btn-fancy btn-txt" onclick="exportToTXT()">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#3498db" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path><polyline points="14 2 14 8 20 8"></polyline><line x1="16" y1="13" x2="8" y2="13"></line><line x1="16" y1="17" x2="8" y2="17"></line><polyline points="10 9 9 9 8 9"></polyline></svg>
              TXT
            </button>
          </div>
          <p style="margin-top: 15px; font-size: 0.65rem; color: var(--muted); text-align: center;">
            💡 Tip: Instal sebagai PWA untuk Desktop APK
          </p>
        </div>
      </div>

      <!-- Main Content Area -->
      <div class="content-area">
        <div class="view-tabs">
          <button class="tab-btn active" onclick="switchView(event, 'daily')">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect><line x1="16" y1="2" x2="16" y2="6"></line><line x1="8" y1="2" x2="8" y2="6"></line><line x1="3" y1="10" x2="21" y2="10"></line><path d="M8 14h.01"></path><path d="M12 14h.01"></path><path d="M16 14h.01"></path><path d="M8 18h.01"></path><path d="M12 18h.01"></path><path d="M16 18h.01"></path></svg>
            Harian
          </button>
          <button class="tab-btn" onclick="switchView(event, 'monthly')">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect><line x1="16" y1="2" x2="16" y2="6"></line><line x1="8" y1="2" x2="8" y2="6"></line><line x1="3" y1="10" x2="21" y2="10"></line><line x1="11" y1="14" x2="11" y2="18"></line><line x1="15" y1="14" x2="15" y2="18"></line><line x1="7" y1="14" x2="7" y2="18"></line><line x1="11" y1="14" x2="11" y2="18"></line></svg>
            Bulanan
          </button>
        </div>

        <!-- Info Display -->
        <div class="info-bar">
          <div>
            <div class="loc-name" id="displayLoc">Menunggu Lokasi...</div>
            <div style="font-size: 0.7rem; color: var(--muted);" id="displayCoords">-</div>
          </div>
          <div style="text-align: right">
            <div class="date-hijri" id="displayHijri">-</div>
            <div style="font-size: 0.8rem; color: var(--muted);" id="displayMasehi">-</div>
          </div>
        </div>

        <!-- Views -->
        <div id="dailyView" class="view-content active">
          <div class="prayer-list" id="dailyList"></div>
        </div>

        <div id="monthlyView" class="view-content">
          <div class="table-container">
            <table id="monthlyTable">
              <thead>
                <tr>
                  <th>Tgl</th>
                  <th>Imsak</th>
                  <th>Subuh</th>
                  <th>Terbit</th>
                  <th>Dhuha</th>
                  <th>Dzuhur</th>
                  <th>Ashar</th>
                  <th>Maghrib</th>
                  <th>Isya</th>
                </tr>
              </thead>
              <tbody id="monthlyBody"></tbody>
            </table>
          </div>
        </div>
      </div> <!-- End Content Area -->
    </div> <!-- End Main Grid -->
  </div> <!-- End Container -->

  <script>
    let currentData = [];
    let userCoords = { lat: -6.2088, lon: 106.8456 }; // Default Jakarta
    let currentCity = "Jakarta, Indonesia";

    const prayersArr = [
      { key: 'Imsak', name: 'Imsak', icon: '⏲️' },
      { key: 'Fajr', name: 'Subuh', icon: '🕌' },
      { key: 'Sunrise', name: 'Terbit', icon: '🌅' },
      { key: 'Dhuha', name: 'Dhuha', icon: '🌤️' },
      { key: 'Dhuhr', name: 'Dzuhur', icon: '☀️' },
      { key: 'Asr', name: 'Ashar', icon: '🌥️' },
      { key: 'Maghrib', name: 'Maghrib', icon: '🌇' },
      { key: 'Isha', name: 'Isya', icon: '🌃' }
    ];

    function calculateDhuha(sunrise) {
      const [hours, mins] = sunrise.split(':').map(Number);
      const date = new Date();
      date.setHours(hours);
      date.setMinutes(mins + 20);
      return date.getHours().toString().padStart(2, '0') + ':' + 
             date.getMinutes().toString().padStart(2, '0');
    }

    // Initialize
    window.onload = async () => {
      const now = new Date();
      populateYears();
      document.getElementById('monthSelect').value = now.getMonth() + 1;
      document.getElementById('yearInput').value = now.getFullYear();

      // Try auto location
      if (navigator.geolocation) {
        navigator.geolocation.getCurrentPosition(pos => {
          userCoords = { lat: pos.coords.latitude, lon: pos.coords.longitude };
          reverseGeocode(userCoords.lat, userCoords.lon);
          updateData();
        }, () => {
          updateData(); // Fallback to default
        });
      } else {
        updateData();
      }

      setTimeout(() => {
        document.getElementById('loadingOverlay').style.opacity = '0';
        setTimeout(() => document.getElementById('loadingOverlay').style.display = 'none', 500);
      }, 1500);
    };

    function populateYears() {
      const yearSelect = document.getElementById('yearInput');
      const currentYear = new Date().getFullYear();
      for (let y = currentYear - 5; y <= currentYear + 10; y++) {
        const opt = document.createElement('option');
        opt.value = y;
        opt.innerText = y;
        yearSelect.appendChild(opt);
      }
      initTheme();
    }

    function initTheme() {
      const theme = localStorage.getItem('theme') || 'dark';
      if (theme === 'light') {
        document.body.classList.add('light-mode');
      }
    }

    function toggleTheme() {
      document.body.classList.toggle('light-mode');
      const isLight = document.body.classList.contains('light-mode');
      localStorage.setItem('theme', isLight ? 'light' : 'dark');
    }

    function changeMonth(delta) {
      const sel = document.getElementById('monthSelect');
      let val = parseInt(sel.value) + delta;
      if (val < 1) {
        val = 12;
        changeYear(-1);
      } else if (val > 12) {
        val = 1;
        changeYear(1);
      }
      sel.value = val;
      updateData();
    }

    function changeYear(delta) {
      const sel = document.getElementById('yearInput');
      let val = parseInt(sel.value) + delta;
      const min = parseInt(sel.options[0].value);
      const max = parseInt(sel.options[sel.options.length - 1].value);

      if (val >= min && val <= max) {
        sel.value = val;
        updateData();
      }
    }

    async function reverseGeocode(lat, lon) {
      try {
        const res = await fetch(`https://nominatim.openstreetmap.org/reverse?lat=${lat}&lon=${lon}&format=json`);
        const data = await res.json();
        currentCity = data.address.city || data.address.town || data.address.state || "Lokasi Anda";
        document.getElementById('displayLoc').innerText = currentCity;
        document.getElementById('displayCoords').innerText = `${lat.toFixed(4)}, ${lon.toFixed(4)}`;
      } catch (e) { console.error(e); }
    }

    function switchView(e, view) {
      document.querySelectorAll('.view-content').forEach(v => v.classList.remove('active'));
      document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
      document.getElementById(view + 'View').classList.add('active');
      if (e && e.currentTarget) {
        e.currentTarget.classList.add('active');
      } else {
        // Fallback if triggered without event
        const btnIndex = view === 'daily' ? 0 : 1;
        document.querySelectorAll('.tab-btn')[btnIndex].classList.add('active');
      }
    }

    async function updateData() {
      const month = document.getElementById('monthSelect').value;
      const year = document.getElementById('yearInput').value;
      const method = document.getElementById('methodSelect').value;
      const school = document.getElementById('asrSchool').value;

      // Always use Gregorian endpoint as it contains Hijri info
      const url = `https://api.aladhan.com/v1/calendar/${year}/${month}?latitude=${userCoords.lat}&longitude=${userCoords.lon}&method=${method}&school=${school}`;

      try {
        const res = await fetch(url);
        const data = await res.json();
        if (data.code !== 200) throw new Error(data.status);
        currentData = data.data;
        renderDaily();
        renderMonthly();
      } catch (e) {
        console.error(e);
        alert("Gagal mengambil data: " + e.message);
      }
    }

    function renderDaily() {
      const now = new Date();
      const day = now.getDate();
      const month = now.getMonth() + 1;
      const year = now.getFullYear();

      // Find today's data in currentData
      const todayData = currentData.find(d =>
        parseInt(d.date.gregorian.day) === day &&
        parseInt(d.date.gregorian.month.number) === month &&
        parseInt(d.date.gregorian.year) === year
      ) || currentData[0]; // Fallback to first day if month is different

      if (!todayData) return;

      document.getElementById('displayHijri').innerText = `${todayData.date.hijri.day} ${todayData.date.hijri.month.en} ${todayData.date.hijri.year} H`;
      document.getElementById('displayMasehi').innerText = todayData.date.gregorian.date;

      const list = document.getElementById('dailyList');
      list.innerHTML = '';

      prayersArr.forEach(p => {
        let time;
        if (p.key === 'Dhuha') {
          const sunrise = todayData.timings.Sunrise.split(' ')[0];
          time = calculateDhuha(sunrise);
        } else {
          time = todayData.timings[p.key].split(' ')[0];
        }

        const card = document.createElement('div');
        card.className = 'prayer-card';
        card.innerHTML = `
        <div class="prayer-info">
          <span class="p-icon">${p.icon}</span>
          <span class="p-name">${p.name}</span>
        </div>
        <span class="p-time">${time}</span>
      `;
        list.appendChild(card);
      });
    }

    function renderMonthly() {
      const body = document.getElementById('monthlyBody');
      if (!body) return;
      body.innerHTML = '';
      
      const now = new Date();
      const todayDay = now.getDate();
      const todayMonth = now.getMonth() + 1;
      const todayYear = now.getFullYear();
      
      const calendar = document.getElementById('calendarType').value;

      currentData.forEach(d => {
        const tr = document.createElement('tr');
        const dayDisplay = (calendar === 'hijri') ? d.date.hijri.day : d.date.gregorian.day;
        
        if (parseInt(d.date.gregorian.day) === todayDay && 
            parseInt(d.date.gregorian.month.number) === todayMonth && 
            parseInt(d.date.gregorian.year) === todayYear) {
          tr.className = 'today-row';
        }

        const sunrise = d.timings.Sunrise.split(' ')[0];
        const dhuha = calculateDhuha(sunrise);

        tr.innerHTML = `
          <td>${dayDisplay}</td>
          <td>${d.timings.Imsak.split(' ')[0]}</td>
          <td>${d.timings.Fajr.split(' ')[0]}</td>
          <td>${sunrise}</td>
          <td>${dhuha}</td>
          <td>${d.timings.Dhuhr.split(' ')[0]}</td>
          <td>${d.timings.Asr.split(' ')[0]}</td>
          <td>${d.timings.Maghrib.split(' ')[0]}</td>
          <td>${d.timings.Isha.split(' ')[0]}</td>
        `;
        body.appendChild(tr);
      });
    }

    // Search Logic
    let searchTimer;
    document.getElementById('cityInput').addEventListener('input', (e) => {
      clearTimeout(searchTimer);
      const query = e.target.value;
      if (query.length < 3) return;
      searchTimer = setTimeout(() => searchCities(query), 500);
    });

    async function searchCities(query) {
      const res = await fetch(`https://nominatim.openstreetmap.org/search?q=${query}&format=json&limit=5`);
      const data = await res.json();
      const sugg = document.getElementById('suggestions');
      sugg.innerHTML = '';
      sugg.style.display = 'block';
      data.forEach(item => {
        const div = document.createElement('div');
        div.className = 'suggestion-item';
        div.innerText = item.display_name;
        div.onclick = () => {
          userCoords = { lat: parseFloat(item.lat), lon: parseFloat(item.lon) };
          currentCity = item.display_name.split(',')[0];
          document.getElementById('displayLoc').innerText = currentCity;
          document.getElementById('displayCoords').innerText = `${userCoords.lat.toFixed(4)}, ${userCoords.lon.toFixed(4)}`;
          document.getElementById('cityInput').value = item.display_name;
          sugg.style.display = 'none';
          updateData();
        };
        sugg.appendChild(div);
      });
    }

    function getLocation() {
      if (navigator.geolocation) {
        navigator.geolocation.getCurrentPosition(pos => {
          userCoords = { lat: pos.coords.latitude, lon: pos.coords.longitude };
          reverseGeocode(userCoords.lat, userCoords.lon);
          updateData();
        });
      }
    }

    // --- EXPORT FUNCTIONS ---

    function sanitizeFilename(name) {
      return name.replace(/[^a-z0-9]/gi, '_').toLowerCase();
    }

    function exportToPDF() {
      if (!currentData || currentData.length === 0) {
        alert("Data belum siap. Mohon tunggu atau klik 'Update Jadwal' dulu.");
        return;
      }

      try {
        const { jsPDF } = window.jspdf;
        const doc = new jsPDF('landscape'); 

        const monthName = document.getElementById('monthSelect').options[document.getElementById('monthSelect').selectedIndex].text;
        const yearVal = document.getElementById('yearInput').value;

        doc.setFontSize(18);
        doc.text(`Jadwal Sholat - ${currentCity}`, 14, 20);
        doc.setFontSize(12);
        doc.text(`Bulan: ${monthName} ${yearVal}`, 14, 30);

        const rows = currentData.map(d => {
          const sunrise = d.timings.Sunrise.split(' ')[0];
          return [
            d.date.gregorian.day,
            d.timings.Imsak.split(' ')[0],
            d.timings.Fajr.split(' ')[0],
            sunrise,
            calculateDhuha(sunrise),
            d.timings.Dhuhr.split(' ')[0],
            d.timings.Asr.split(' ')[0],
            d.timings.Maghrib.split(' ')[0],
            d.timings.Isha.split(' ')[0]
          ];
        });

        if (typeof doc.autoTable !== 'function') {
          throw new Error("Plugin autoTable tidak terdeteksi. Pastikan koneksi internet stabil.");
        }

        doc.autoTable({
          head: [['Tgl', 'Imsak', 'Subuh', 'Terbit', 'Dhuha', 'Dzuhur', 'Ashar', 'Maghrib', 'Isya']],
          body: rows,
          startY: 40,
          theme: 'grid',
          headStyles: { fillColor: [201, 168, 76] },
          styles: { fontSize: 9 }
        });

        const fileName = `Jadwal_Sholat_${sanitizeFilename(currentCity)}_${monthName}_${yearVal}.pdf`;
        doc.save(fileName);
      } catch (err) {
        console.error(err);
        alert("Gagal membuat PDF: " + err.message);
      }
    }

    function exportToTXT() {
      if (!currentData || currentData.length === 0) {
        alert("Data belum siap. Mohon tunggu atau klik 'Update Jadwal' dulu.");
        return;
      }

      try {
        let content = `JADWAL SHOLAT - ${currentCity}\n`;
        content += `Bulan: ${document.getElementById('monthSelect').options[document.getElementById('monthSelect').selectedIndex].text} ${document.getElementById('yearInput').value}\n`;
        content += `========================================================================================\n`;
        content += `Tgl | Imsak | Subuh | Terbit| Dhuha | Dzuhur | Ashar | Maghrib | Isya\n`;
        content += `----------------------------------------------------------------------------------------\n`;

        currentData.forEach(d => {
          const day = d.date.gregorian.day.toString().padStart(2, ' ');
          const ims = d.timings.Imsak.split(' ')[0];
          const sub = d.timings.Fajr.split(' ')[0];
          const ter = d.timings.Sunrise.split(' ')[0];
          const dhu = calculateDhuha(ter);
          const dzu = d.timings.Dhuhr.split(' ')[0];
          const asr = d.timings.Asr.split(' ')[0];
          const mag = d.timings.Maghrib.split(' ')[0];
          const isy = d.timings.Isha.split(' ')[0];
          content += `${day}  | ${ims} | ${sub} | ${ter} | ${dhu} | ${dzu}  | ${asr} | ${mag}   | ${isy}\n`;
        });

        const blob = new Blob([content], { type: 'text/plain' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        const monthName = document.getElementById('monthSelect').options[document.getElementById('monthSelect').selectedIndex].text;
        const yearVal = document.getElementById('yearInput').value;

        a.href = url;
        a.download = `Jadwal_Sholat_${sanitizeFilename(currentCity)}_${monthName}_${yearVal}.txt`;
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);
        URL.revokeObjectURL(url);
      } catch (err) {
        console.error(err);
        alert("Gagal membuat TXT: " + err.message);
      }
    }

    function exportToExcel() {
      if (!currentData || currentData.length === 0) {
        alert("Data belum siap. Mohon tunggu atau klik 'Update Jadwal' dulu.");
        return;
      }

      try {
        if (typeof XLSX === 'undefined') {
          throw new Error("Library XLSX tidak terdeteksi. Pastikan koneksi internet stabil.");
        }

        const rows = currentData.map(d => {
          const terbit = d.timings.Sunrise.split(' ')[0];
          return {
            Tanggal: d.date.gregorian.date,
            Hijri: `${d.date.hijri.day} ${d.date.hijri.month.en} ${d.date.hijri.year}`,
            Imsak: d.timings.Imsak.split(' ')[0],
            Subuh: d.timings.Fajr.split(' ')[0],
            Terbit: terbit,
            Dhuha: calculateDhuha(terbit),
            Dzuhur: d.timings.Dhuhr.split(' ')[0],
            Ashar: d.timings.Asr.split(' ')[0],
            Maghrib: d.timings.Maghrib.split(' ')[0],
            Isya: d.timings.Isha.split(' ')[0]
          };
        });

        const worksheet = XLSX.utils.json_to_sheet(rows);
        const workbook = XLSX.utils.book_new();
        XLSX.utils.book_append_sheet(workbook, worksheet, "Jadwal Sholat");

        const monthName = document.getElementById('monthSelect').options[document.getElementById('monthSelect').selectedIndex].text;
        const yearVal = document.getElementById('yearInput').value;
        const fileName = `Jadwal_Sholat_${sanitizeFilename(currentCity)}_${monthName}_${yearVal}.xlsx`;

        XLSX.writeFile(workbook, fileName);
      } catch (err) {
        console.error(err);
        alert("Gagal membuat Excel: " + err.message);
      }
    }

    // --- DAILY EXPORT FUNCTIONS ---

    function exportDailyTXT() {
      const dayData = getTodayData();
      if (!dayData) return;

      try {
        let content = `JADWAL SHOLAT HARI INI - ${currentCity.toUpperCase()}\n`;
        content += `Tanggal: ${dayData.date.gregorian.date} (${dayData.date.gregorian.weekday.en})\n`;
        content += `Hijriah: ${dayData.date.hijri.day} ${dayData.date.hijri.month.en} ${dayData.date.hijri.year} H\n`;
        content += `------------------------------\n`;
        prayersArr.forEach(p => {
          const name = p.name.padEnd(10);
          let time;
          if (p.key === 'Dhuha') {
            time = calculateDhuha(dayData.timings.Sunrise.split(' ')[0]);
          } else {
            time = dayData.timings[p.key].split(' ')[0];
          }
          content += `${name}: ${time}\n`;
        });

        const blob = new Blob([content], { type: 'text/plain' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = `Jadwal_Harian_${sanitizeFilename(currentCity)}_${dayData.date.gregorian.date}.txt`;
        a.click();
        URL.revokeObjectURL(url);
      } catch (err) { alert("Gagal export TXT: " + err.message); }
    }

    function exportDailyExcel() {
      const dayData = getTodayData();
      if (!dayData) return;

      try {
        const sunrise = dayData.timings.Sunrise.split(' ')[0];
        const row = {
          Tanggal: dayData.date.gregorian.date,
          Hari: dayData.date.gregorian.weekday.en,
          Hijriah: `${dayData.date.hijri.day} ${dayData.date.hijri.month.en} ${dayData.date.hijri.year}`,
          Imsak: dayData.timings.Imsak.split(' ')[0],
          Subuh: dayData.timings.Fajr.split(' ')[0],
          Terbit: sunrise,
          Dhuha: calculateDhuha(sunrise),
          Dzuhur: dayData.timings.Dhuhr.split(' ')[0],
          Ashar: dayData.timings.Asr.split(' ')[0],
          Maghrib: dayData.timings.Maghrib.split(' ')[0],
          Isya: dayData.timings.Isha.split(' ')[0]
        };
        const ws = XLSX.utils.json_to_sheet([row]);
        const wb = XLSX.utils.book_new();
        XLSX.utils.book_append_sheet(wb, ws, "Harian");
        XLSX.writeFile(wb, `Jadwal_Harian_${sanitizeFilename(currentCity)}_${dayData.date.gregorian.date}.xlsx`);
      } catch (err) { alert("Gagal export Excel: " + err.message); }
    }

    function exportDailyPDF() {
      const dayData = getTodayData();
      if (!dayData) return;

      try {
        const { jsPDF } = window.jspdf;
        const doc = new jsPDF();
        doc.setFontSize(18);
        doc.text(`Jadwal Sholat Harian - ${currentCity}`, 14, 20);
        doc.setFontSize(12);
        doc.text(`Tanggal: ${dayData.date.gregorian.date} (${dayData.date.gregorian.weekday.en})`, 14, 30);
        doc.text(`Hijriah: ${dayData.date.hijri.day} ${dayData.date.hijri.month.en} ${dayData.date.hijri.year} H`, 14, 37);

        const rows = prayersArr.map(p => {
          let time;
          if (p.key === 'Dhuha') {
            time = calculateDhuha(dayData.timings.Sunrise.split(' ')[0]);
          } else {
            time = dayData.timings[p.key].split(' ')[0];
          }
          return [p.name, time];
        });
        doc.autoTable({
          head: [['Sholat', 'Waktu']],
          body: rows,
          startY: 45,
          theme: 'striped',
          headStyles: { fillColor: [201, 168, 76] }
        });
        doc.save(`Jadwal_Harian_${sanitizeFilename(currentCity)}_${dayData.date.gregorian.date}.pdf`);
      } catch (err) { alert("Gagal export PDF: " + err.message); }
    }

    function getTodayData() {
      const now = new Date();
      const day = now.getDate();
      const selMonth = parseInt(document.getElementById('monthSelect').value);
      const selYear = parseInt(document.getElementById('yearInput').value);

      // Find today's data in currentData
      const todayData = currentData.find(d =>
        parseInt(d.date.gregorian.day) === day &&
        parseInt(d.date.gregorian.month.number) === selMonth &&
        parseInt(d.date.gregorian.year) === selYear
      ) || currentData[0];

      if (!todayData) {
        alert("Data belum siap.");
        return null;
      }
      return todayData;
    }
  </script>
